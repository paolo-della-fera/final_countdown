<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Il Ritorno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #060610; font-family: system-ui, -apple-system, sans-serif; }
    canvas#rain {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.35;
    }
    #app {
      min-height: 100svh; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: clamp(1rem, 5vw, 3rem);
      position: relative; z-index: 1;
      gap: clamp(1rem, 3vw, 1.8rem);
    }
    #lightning-overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #e8f4ff;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transition: opacity 0.03s;
    }
    #sad-emoji { font-size: clamp(2.5rem, 10vw, 5rem); animation: droop 4s ease-in-out infinite; display: block; text-align: center; }
    @keyframes droop { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    #sad-title { font-size: clamp(2rem, 9vw, 4rem); font-weight: 900; color: #94a3b8; text-align: center; letter-spacing: 0.04em; line-height: 1.2; text-shadow: 0 0 40px rgba(148,163,184,0.3); animation: sadpulse 3s ease-in-out infinite; }
    @keyframes sadpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    #sad-sub { font-size: clamp(0.7rem, 2.5vw, 1rem); color: rgba(148,163,184,0.4); text-align: center; letter-spacing: 0.15em; text-transform: uppercase; font-style: italic; }
    #countdown-grid { display: flex; gap: clamp(0.5rem, 2.5vw, 1rem); flex-wrap: wrap; justify-content: center; width: 100%; }
    .unit { background: rgba(255,255,255,0.03); border: 1px solid rgba(148,163,184,0.12); border-radius: 14px; padding: clamp(0.6rem, 2.5vw, 1rem) clamp(0.6rem, 2.5vw, 1.2rem); min-width: clamp(64px, 18vw, 90px); text-align: center; flex: 1; max-width: 110px; }
    .unit-val { font-size: clamp(1.6rem, 7vw, 2.8rem); font-weight: 800; color: #94a3b8; display: block; line-height: 1; font-variant-numeric: tabular-nums; }
    .unit-lbl { font-size: clamp(0.55rem, 2vw, 0.72rem); color: rgba(148,163,184,0.35); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 5px; display: block; }
    #sad-quote { font-size: clamp(0.7rem, 2.2vw, 0.9rem); color: rgba(148,163,184,0.40); text-align: center; font-style: italic; letter-spacing: 0.05em; max-width: 340px; line-height: 1.6; }
    #expired-msg { display: none; flex-direction: column; align-items: center; gap: clamp(0.7rem, 2.5vw, 1rem); text-align: center; position: relative; z-index: 10; }
    #expired-line1 { font-size: clamp(1.8rem, 8vw, 3rem); font-weight: 900; color: #64748b; letter-spacing: 0.04em; animation: sadpulse 2s ease-in-out infinite; }
    #expired-line2 { font-size: clamp(1rem, 4vw, 1.4rem); font-weight: 600; color: #475569; line-height: 1.6; }
    #expired-line3 { font-size: clamp(0.75rem, 2.5vw, 0.95rem); color: rgba(148,163,184,0.3); font-style: italic; }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <div id="lightning-overlay"></div>
  <div id="app">
    <span id="sad-emoji">😔</span>
    <div id="sad-title">Il Ritorno(?)</div>
    <div id="sad-sub">mancano solo...</div>
    <div id="countdown-grid">
      <div class="unit"><span class="unit-val" id="d">00</span><span class="unit-lbl">giorni</span></div>
      <div class="unit"><span class="unit-val" id="h">00</span><span class="unit-lbl">ore</span></div>
      <div class="unit"><span class="unit-val" id="m">00</span><span class="unit-lbl">minuti</span></div>
      <div class="unit"><span class="unit-val" id="s">00</span><span class="unit-lbl">secondi</span></div>
    </div>
    <div id="expired-msg">
      <div id="expired-line1">💀 Il momento temuto è arrivato.</div>
      <div id="expired-line2">un mese di libertà.<br>FINITO.</div>
    </div>
    <div id="sad-quote">"ogni secondo che passa è un secondo in meno di pace e tranquillità"</div>
  </div>
  <script>
    const TARGET = new Date(2026, 5, 27, 12, 0, 0);
    const rain = document.getElementById("rain");
    const rctx = rain.getContext("2d");
    let drops = [];

    function resizeRain() { rain.width = window.innerWidth; rain.height = window.innerHeight; }
    function initDrops() {
      drops = [];
      for (let i = 0; i < 120; i++) {
        drops.push({ x: Math.random() * rain.width, y: Math.random() * rain.height, len: Math.random() * 18 + 8, speed: Math.random() * 3 + 2, opacity: Math.random() * 0.4 + 0.1 });
      }
    }
    function animateRain() {
      rctx.clearRect(0, 0, rain.width, rain.height);
      drops.forEach(d => {
        rctx.beginPath(); rctx.moveTo(d.x, d.y); rctx.lineTo(d.x - 1, d.y + d.len);
        rctx.strokeStyle = "rgba(148,163,184," + d.opacity + ")"; rctx.lineWidth = 1; rctx.stroke();
        d.y += d.speed;
        if (d.y > rain.height) { d.y = -d.len; d.x = Math.random() * rain.width; }
      });
      requestAnimationFrame(animateRain);
    }

    let heavyRainStarted = false;

    function pad(n) { return String(Math.floor(n)).padStart(2, "0"); }
    function updateCountdown() {
      const diff = TARGET - new Date();
      if (!heavyRainStarted && diff > 0 && diff <= 7 * 86400000) {
        heavyRainStarted = true;
        startHeavyRain();
      }
      if (diff <= 0) {
        ["countdown-grid","sad-title","sad-emoji","sad-sub","sad-quote"].forEach(id => document.getElementById(id).style.display = "none");
        document.getElementById("expired-msg").style.display = "flex";
        isExpired = true;
        startStorm();
        return;
      }
      document.getElementById("d").textContent = pad(Math.floor(diff / 86400000));
      document.getElementById("h").textContent = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById("m").textContent = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById("s").textContent = pad(Math.floor((diff % 60000) / 1000));
    }

    resizeRain(); initDrops(); animateRain();
    updateCountdown(); setInterval(updateCountdown, 1000);
    window.addEventListener("resize", () => { resizeRain(); initDrops(); });

    function startHeavyRain() {
      drops = [];
      for (let i = 0; i < 280; i++) {
        drops.push({
          x: Math.random() * rain.width,
          y: Math.random() * rain.height,
          len: Math.random() * 22 + 10,
          speed: Math.random() * 5 + 5,
          opacity: Math.random() * 0.5 + 0.2
        });
      }
      rain.style.opacity = "0.6";
    }

    function startStorm() {
      // heavy rain
      drops = [];
      for (let i = 0; i < 350; i++) {
        drops.push({
          x: Math.random() * rain.width,
          y: Math.random() * rain.height,
          len: Math.random() * 28 + 12,
          speed: Math.random() * 7 + 6,
          opacity: Math.random() * 0.6 + 0.2
        });
      }
      rain.style.opacity = "0.7";
      scheduleLightning();
    }

    function scheduleLightning() {
      const delay = Math.random() * 2000 + 600;
      setTimeout(() => {
        flashLightning();
        if (isExpired) scheduleLightning();
      }, delay);
    }

    function flashLightning() {
      const overlay = document.getElementById("lightning-overlay");
      overlay.style.opacity = "0.85";
      setTimeout(() => { overlay.style.opacity = "0"; }, 60);
      setTimeout(() => {
        overlay.style.opacity = "0.5";
        setTimeout(() => { overlay.style.opacity = "0"; }, 40);
      }, 120);
    }
  </script>
</body>
</html>
